# ######## Window rules ########
source = ~/.config/hypr/extra/vars.conf

# Uncomment to apply global transparency to all windows:
# windowrulev2 = opacity 0.89 override 0.89 override, class:.*


windowrule {
	name = KDE Connect Pointer
	match:class = (org.kde.kdeconnect.daemon)
	no_blur = 1
	opacity = 1
	decorate = false
	# keep_aspect_ratio = true
	min_size = 1920 1080
	# move = 0 0
	# suppress_event = activate
	no_anim = 1
	no_focus = true
	pin = true
	tile = 0
}

windowrule {
		name = TG Mini App
		match:title = ^(Mini App:)(.*)$ 
		match:class = (org.telegram.desktop)
		float = 1 
		center = 1
		no_blur = 1
		min_size = 410 710
		decorate = 0
}


windowrule {
		name = RyujinxOverlay
		match:class = ^(Ryujinx)
		match:title = ContentDialogOverlayWindow
		no_blur = 1
		decorate = 0
}

# No border for one window
workspace = w[t1], gapsout:-1, gapsin:0, rounding:0, border:0
#workspace = w[f1], gapsout:0, gapsin:0, rounding:1
windowrule = match:float 1, rounding $border_radius, border_size $border_width

# Disable blur for xwayland context menus
windowrule = match:title ^(QT6 Calculator)$, float 1
# windowrulev2 = noblur, xwayland:1

# Emacs fix
windowrulev = blur, class: (Emacs)
# windowrule = match:class (Emacs), size 1920 1080
# windowrule = match:class (Emacs), center 1

# Floating
windowrule = match:title ^(Open File)(.*)$, float 1
windowrule = match:title ^(Open File)(.*)$, center 1
windowrule = match:class (org.gnome.Calculator), float 1

windowrule = match:title ^(Select a File)(.*)$, float 1, center 1
#windowrule = match:title ^(Select a File)(.*)$, center 1



windowrule = match:title ^(Choose wallpaper)(.*)$, center 1, float 1
#windowrule = match:title ^(Choose wallpaper)(.*)$, float 1
windowrule = match:title ^(Choose wallpaper)(.*)$, size 60% 65%

windowrule = match:title ^(Open Folder)(.*)$, center 1
windowrule = match:title ^(Open Folder)(.*)$, float 1

windowrule = match:title ^(File Already Exists), float 1 center 1

windowrule = match:title ^(Save As)(.*)$, center 1
windowrule = match:title ^(Save As)(.*)$, float 1

windowrule = match:title ^(Library)(.*)$, center 1
windowrule = match:title ^(Library)(.*)$, float 1

windowrule = match:title ^(.*)(wants to save)$, center 1
windowrule = match:title ^(.*)(wants to save)$, float 1

windowrule = match:title ^(.*)(wants to open)$, center 1
windowrule = match:title ^(.*)(wants to open)$, float 1

windowrule = match:class ^(blueberry\.py)$, float 1
windowrule = match:class ^(guifetch)$, float 1 # FlafyDev/guifetch

windowrule = match:class ^(pavucontrol)$, float 1
windowrule = match:class ^(pavucontrol)$, size 45%
windowrule = match:class ^(pavucontrol)$, center 1

windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float 1
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size 45%
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, center 1

windowrule = match:class ^(nm-connection-editor)$, float 1
windowrule = match:class ^(nm-connection-editor)$, size 45%
windowrule = match:class ^(nm-connection-editor)$, center 1

windowrule = match:class .*plasmawindowed.*, float 1
windowrule = match:class kcm_.*, float 1
windowrule = match:class .*bluedevilwizard, float 1

windowrule = match:class xdg-desktop-portal-gtk, float 1
windowrule = match:class xdg-desktop-portal-gtk, center 1

windowrule = match:title Protontricks, float 1

windowrule = match:class org.freedesktop.impl.portal.desktop.kde, float 1, size 1200 800
#windowrule = match:class org.freedesktop.impl.portal.desktop.kde, size 100% 100% 


# Move
# kde-material-you-colors spawns a window when changing dark/light theme. This is to make sure it doesn't interfere at all.
windowrule = match:class ^(plasma-changeicons)$, float 1
windowrule = match:class ^(plasma-changeicons)$, no_initial_focus 1
windowrule = match:class ^(plasma-changeicons)$, move 999999 999999
# stupid dolphin copy
windowrule = match:title ^(Copying — Dolphin)$, move 40 80

# Tiling
windowrule = match:class ^dev\.warp\.Warp$, tile 1

# Picture-in-Picture
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float 1
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, keep_aspect_ratio 1
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, move 73% 72%
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, size 25%
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float 1
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, pin 1

# --- Tearing ---
windowrule = match:title .*\.exe, immediate 1
windowrule = match:title .*minecraft.*, immediate 1
windowrule = match:class ^(steam_app).*,immediate 1

# ######## Workspace rules ########
workspace = special:special, gapsout:30

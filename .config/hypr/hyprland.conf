source = ~/.config/hypr/extra/execs.conf
source = ~/.config/hypr/extra/keybinds.conf
source = ~/.config/hypr/extra/rules.conf
source = ~/.config/hypr/extra/env.conf
source = ~/.config/hypr/extra/vars.conf
source = ~/.config/hypr/noctalia/noctalia-colors.conf

monitorv2 {
	  output = DP-1
	  mode = 1920x1080@165
	  position = 0x0
	  scale = 1.0
	  vrr = 1
}
monitorv2 {
		output = HDMI-A-1
		mode = 1920x1080@60
		scale = 1.0
		position = 1920x0
#		position = 1920x-540
#		transform = 1
}

cursor {
		no_hardware_cursors = true
} 


general {
    gaps_in = $gaps_in
    gaps_out = $gaps_out
    border_size = $border_width
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = $border_radius

    shadow {
        enabled = false
        range = 4
        render_power = 3
    }

    blur {
        enabled = true
        size = 5
        passes = 1
        vibrancy = 0.1696
    }
}

layerrule {
		name = noctalia
		match:namespace = noctalia-background-.*$
		ignore_alpha = 0.5
		blur = true 
		blur_popups = false
}

animations {
    enabled = yes
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    
	#animation = workspaces, 0, 1.94, almostLinear, fade
    #animation = workspacesIn, 0, 1.21, linear, slide 

	animation = workspaces, 1, 3, overshot, slidefade 10%
    animation = workspacesIn, 1, 3, overshot, slidefade 10%
    animation = workspacesOut, 1, 3, overshot, slidefade 10%
    #animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
	vfr = true
}

input {
    kb_file = ~/.config/xkb/en_ru_stradlater_layout.xkb
    repeat_delay = 220
    repeat_rate = 60
}


